<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jacob Nollette | Resume</title>
  <meta name="description" content="Resume of Jacob Nollette - DevOps, SRE, and Platform Engineering.">
  <meta name="theme-color" content="#f5f4ef">
  <link rel="canonical" href="https://resume.jacobnollette.com/">
  <meta property="og:title" content="Jacob Nollette | Resume">
  <meta property="og:description" content="DevOps, SRE, and Platform Engineering resume.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://resume.jacobnollette.com/">
  <meta property="og:site_name" content="Jacob Nollette Resume">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg"></div>
  <main class="page">
    <article class="resume">
      <header class="resume-header">
        <div id="resume-logo-block">
          <img src="./logo.png" alt="Jacob Nollette" class="resume-logo" loading="eager" decoding="async">
        </div>
        <div id="resume-headshot-block">
          <img src="./headshot.png" alt="Jacob Nollette" class="resume-headshot" loading="eager" decoding="async">
        </div>
        <div class="resume-header-info">
          <h1>Jacob Nollette</h1>
          <p class="resume-contact">Minneapolis, MN &bull; jacob@jacobnollette.com &bull; 952&#8209;428&#8209;9199</p>
        </div>
      </header>
      <div class="resume-body markdown-body" id="resume-content" aria-live="polite"></div>
    </article>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    async function loadResume() {
      const target = document.getElementById("resume-content");
      try {
        const response = await fetch("./resume.md", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Unable to load resume.md");
        }
        const markdown = await response.text();
        marked.setOptions({ gfm: true, breaks: true });
        target.innerHTML = marked.parse(markdown);
      } catch (error) {
        target.innerHTML = "<p>Unable to load resume content.</p>";
        console.error(error);
      }
    }
    loadResume();
  </script>
</body>
</html>
